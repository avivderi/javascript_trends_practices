version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: my_database
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=my_database
      - PORT=3000
    depends_on:
      - db
    command: node -e "setInterval(()=>console.log('app running with env file'),5000)"

volumes:
  pgdata: